name: Release From Dashboard

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag release (es. v1.0.7)"
        required: true
        type: string
      release_name:
        description: "Nome release (es. 1.0.7)"
        required: true
        type: string
      release_notes:
        description: "Note release"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: dist-electron/**
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-win
          path: dist-electron/**
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifacts-mac
          path: release-assets/mac
      - uses: actions/download-artifact@v4
        with:
          name: artifacts-win
          path: release-assets/win
      - name: Ensure release assets exist
        run: |
          shopt -s globstar nullglob
          FILES=(
            release-assets/**/*.yml
            release-assets/**/*.yaml
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "Nessun asset trovato da caricare"
            exit 1
          fi
      - name: Create/update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.release_name }}
          body: ${{ inputs.release_notes }}
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.yml
            release-assets/**/*.yaml
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
