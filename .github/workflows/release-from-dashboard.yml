name: Release From Dashboard

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag release (es. v1.0.7)"
        required: true
        type: string
      release_name:
        description: "Nome release (es. 1.0.7)"
        required: true
        type: string
      release_notes:
        description: "Note release"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: dist-electron/**
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-win
          path: dist-electron/**
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: artifacts-mac
          path: release-assets/mac
      - uses: actions/download-artifact@v4
        with:
          name: artifacts-win
          path: release-assets/win
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$RELEASE_NAME" --notes "${RELEASE_NOTES:-}"
          fi

          shopt -s globstar nullglob
          FILES=(
            release-assets/**/*.yml
            release-assets/**/*.yaml
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "Nessun asset trovato da caricare"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${FILES[@]}" --clobber
